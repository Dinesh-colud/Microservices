spring.application.name=api-gateway

server.port=8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Product Service Route
spring.cloud.gateway.mvc.routes[0].id=product-service
spring.cloud.gateway.mvc.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/products/**

# Inventory Service Route
spring.cloud.gateway.mvc.routes[1].id=inventory-service
spring.cloud.gateway.mvc.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/inventory/**

# Order Service Route
spring.cloud.gateway.mvc.routes[2].id=order-service
spring.cloud.gateway.mvc.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/orders/**
