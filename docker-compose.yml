services:

  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Dinesh999@

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pDinesh999@"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  discovery-server:
    build:
      context: ./discovery-server/discovery-server

    container_name: discovery-server

    ports:
      - "8761:8761"

    restart: always

  product-service:
    build:
      context: ./product-service/product-service

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

    restart: on-failure

  inventory-service:
    build:
      context: ./inventory-service/inventory-service

    ports:
      - "8081:8081"

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

    restart: on-failure

  order-service:
    build:
      context: ./order-service/order-service

    ports:
      - "8082:8082"

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway/api-gateway

    ports:
      - "8083:8083"

    depends_on:
      discovery-server:
        condition: service_started

    restart: on-failure

volumes:
  mysql-data: